<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="../style.css/sign.css" />
  <link rel="stylesheet" href="../style.css/loader.css" />
  <link rel="stylesheet" href="../style.css/reveal.css" />
  <link rel="stylesheet" href="../style.css/toast.css" />
</head>
<body>
  <div class="loader-wrapper">
    <div class="loader-box">
      <div class="loader-logo">W</div>
      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-text">Loading WaveAuth...</div>
    </div>
  </div>

  <div class="page-tools">
    <button class="theme-toggle-btn" type="button">🌙</button>
  </div>

  <div class="background">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="auth-page">
    <section class="auth-card auth-card-single">
      <div class="auth-form-side auth-form-full">
        <div class="form-header">
          <h2>Forgot Password</h2>
          <p>Enter your email and we’ll generate a reset link for your account</p>
        </div>
<div class="auth-helper-box">
  <strong>How it works</strong>
  <p>Enter the email linked to your account. A reset link will be generated for testing and shown in your backend console.</p>
</div>

        <form class="auth-form" id="forgotPasswordForm">
          <div class="input-group">
            <label for="forgotEmail">Email Address</label>
            <input type="email" id="forgotEmail" placeholder="Enter your email" />
          </div>

          <button type="submit" class="btn-primary">Send Reset Link</button>

          <p class="form-message" id="forgotPasswordMessage"></p>

          <p class="bottom-text">
            Remember your password?
            <a href="signin.html">Sign In</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script src="../index.js/loader.js"></script>
  <script src="../index.js/theme.js"></script>
  <script src="../index.js/reveal.js"></script>
  <script src="../index.js/toast.js"></script>
  <script src="../index.js/forget-password.js"></script>
</body>
</html>
