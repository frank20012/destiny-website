<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="./style.css/sign.css" />
  <link rel="stylesheet" href="./style.css/loader.css" />
  <link rel="stylesheet" href="./style.css/reveal.css" />
  <link rel="stylesheet" href="./style.css/toast.css" />
</head>
<body>
  <div class="loader-wrapper">
    <div class="loader-box">
      <div class="loader-logo">W</div>
      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-text">Loading DESKOTP...</div>
    </div>
  </div>

  <div class="page-tools">
    <button class="theme-toggle-btn" type="button">🌙</button>
  </div>

  <div class="background">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="auth-page">
    <section class="auth-card auth-card-single">
      <div class="auth-form-side auth-form-full">
        <div class="form-header">
          <h2>Reset Password</h2>
          <p>Create a new password for your account</p>
        </div>
        <div class="auth-helper-box">
  <strong>Password rules</strong>
  <p>Your new password must be at least 8 characters long and include uppercase, lowercase, and a number.</p>
</div>

        <form class="auth-form" id="resetPasswordForm">
          <div class="input-group">
            <label for="newPassword">New Password</label>
            <div class="password-box">
              <input type="password" id="newPassword" placeholder="Enter new password" />
              <button type="button" class="toggle-password" data-target="newPassword">Show</button>
            </div>
          </div>

          <div class="input-group">
            <label for="confirmNewPassword">Confirm Password</label>
            <div class="password-box">
              <input type="password" id="confirmNewPassword" placeholder="Confirm new password" />
              <button type="button" class="toggle-password" data-target="confirmNewPassword">Show</button>
            </div>
          </div>

          <button type="submit" class="btn-primary">Reset Password</button>

          <p class="form-message" id="resetPasswordMessage"></p>

          <p class="bottom-text">
            Back to
            <a href="signin.html">Sign In</a>
          </p>
        </form>
      </div>
    </section>
  </main>
<script src="./index.js/config.js"></script>
  <script src="./index.js/loader.js"></script>
  <script src="./index.js/panel.js"></script>
  <script src="./index.js/reveal.js"></script>
  <script src="./index.js/toast.js"></script>
  <script src="./index.js/reset-password.js"></script>
</body>
</html>
