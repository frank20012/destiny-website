<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/public/assets/logo/logo-icon.png">
  <title>DESKOTP Orders</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="./style.css/panel.css" />
  <link rel="stylesheet" href="./style.css/orders.css" />
  <link rel="stylesheet" href="./style.css/loader.css" />
  <link rel="stylesheet" href="./style.css/reveal.css" />
  <link rel="stylesheet" href="./style.css/toast.css" />
</head>
<body>
  <div class="loader-wrapper">
    <div class="loader-box">
      <div class="loader-logo">W</div>
      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-text">Loading orders...</div>
    </div>
  </div>

  <div class="orders-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark"><i class="fa-solid fa-bolt"></i></span>
        <span>DESKOTP</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <i class="fa-solid fa-table-columns"></i>
          <span>Dashboard</span>
        </a>

        <a href="service.html">
          <i class="fa-solid fa-layer-group"></i>
          <span>Services</span>
        </a>

        <!-- <a href="Rent a number.html"> -->
          <!-- <i class="fa-solid fa-phone-volume"></i> -->
          <!-- <span>Rent a Number</span> -->
        <!-- </a> -->

        <a href="orders.html" class="active">
          <i class="fa-solid fa-box-open"></i>
          <span>Orders</span>
        </a>

        <a href="wallet.html">
          <i class="fa-solid fa-wallet"></i>
          <span>Wallet</span>
        </a>

        <a href="transactions.html">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          <span>Transactions</span>
        </a>

        <a href="tickets.html">
          <i class="fa-solid fa-headset"></i>
          <span>Support Tickets</span>
        </a>

        <a href="contact.html">
          <i class="fa-solid fa-address-book"></i>
          <span>Contact Manager</span>
        </a>

        <a href="settings.html">
          <i class="fa-solid fa-gear"></i>
          <span>Settings</span>
        </a>

        <a href="signin.html" class="logout-link">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-copy">
                <button class="icon-btn mobile-menu-btn" type="button" id="menuToggle" aria-label="Open menu">
<i class="fas fa-bars"></i></button>
          <span style="margin-left: 10px;">Orders</span>
        </div>

        <div class="topbar-actions">
          <button class="icon-btn theme-toggle-btn" type="button" aria-label="Toggle theme">🌙</button>
          <a href="service.html" class="top-btn">Buy New</a>
          <div class="profile-box">
            <div class="avatar">U</div>
            <span>User</span>
          </div>
        </div>
      </header>

      <section class="orders-toolbar card reveal">
        <div class="orders-toolbar-copy">
          <h2>Order Table</h2>
          <p>Refresh order status, copy values, or cancel active orders</p>
        </div>

        <div class="orders-toolbar-actions">
          <button id="refreshOrdersBtn" class="top-btn" type="button">Refresh All</button>
        </div>
      </section>

      <section class="orders-section reveal">
        <div id="ordersContainer" class="orders-container"></div>
      </section>
    </main>
  </div>

  <script src="./index.js/config.js"></script>
  <script type="module" src="./index.js/require-user.js"></script>
  <script type="module" src="./index.js/session-ui.js"></script>
  <script src="./index.js/panel.js"></script>
  <script src="./index.js/loader.js"></script>
  <script src="./index.js/reveal.js"></script>
  <script src="./index.js/toast.js"></script>
  <script type="module" src="./index.js/order.js"></script>
</body>
</html>
