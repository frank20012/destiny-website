<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/public/assets/logo/logo-icon.png">
  <title>DESKOTP Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="./style.css/panel.css" />
  <link rel="stylesheet" href="./style.css/settings.css" />
  <link rel="stylesheet" href="./style.css/loader.css" />
  <link rel="stylesheet" href="./style.css/reveal.css" />
  <link rel="stylesheet" href="./style.css/toast.css" />
</head>
<body>
  <div class="loader-wrapper">
    <div class="loader-box">
      <div class="loader-logo"><img src="./assets/logo/logo-icon.png" alt=""></div>
      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loader-text">Loading settings...</div>
    </div>
  </div>

  <div class="settings-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
          <img style="height: 50px;" class="logo_mark" src="./assets/logo/logo-icon.png" alt="">
        <span class="brand-text">
<span class="brand-main">Desk</span><span class="brand-accent">OTP</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <i class="fa-solid fa-table-columns"></i>
          <span>Dashboard</span>
        </a>

        <a href="service.html">
          <i class="fa-solid fa-layer-group"></i>
          <span>Services</span>
        </a>

        <!-- <a href="Rent a number.html"> -->
          <!-- <i class="fa-solid fa-phone-volume"></i> -->
          <!-- <span>Rent a Number</span> -->
        <!-- </a> -->

        <a href="orders.html">
          <i class="fa-solid fa-box-open"></i>
          <span>Orders</span>
        </a>

        <a href="wallet.html">
          <i class="fa-solid fa-wallet"></i>
          <span>Wallet</span>
        </a>

        <a href="transactions.html">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          <span>Transactions</span>
        </a>

        <a href="tickets.html">
          <i class="fa-solid fa-headset"></i>
          <span>Support Tickets</span>
        </a>

        <a href="contact.html">
          <i class="fa-solid fa-address-book"></i>
          <span>Contact Manager</span>
        </a>

        <a href="settings.html" class="active">
          <i class="fa-solid fa-gear"></i>
          <span>Settings</span>
        </a>

        <a href="signin.html" class="logout-link">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-copy">
                  <button class="icon-btn mobile-menu-btn" type="button" id="menuToggle" aria-label="Open menu">
<i class="fas fa-bars"></i></button>
          <span class="names">Settings</span>
        </div>

        <div class="topbar-actions">
          <button class="icon-btn theme-toggle-btn" type="button" aria-label="Toggle theme">🌙</button>
          <div class="profile-box">
            <div class="avatar">U</div>
            <span>User</span>
          </div>
        </div>
      </header>

      <section class="settings-grid reveal">
        <div class="card settings-card">
          <div class="section-title">
            <h2>Profile Settings</h2>
            <p>Update your personal information</p>
          </div>

          <form id="profileSettingsForm" class="settings-form">
            <div class="settings-form-grid">
              <div class="settings-field">
                <label for="settingsFirstName">First Name</label>
                <input type="text" id="settingsFirstName" placeholder="Enter first name" />
              </div>

              <div class="settings-field">
                <label for="settingsLastName">Last Name</label>
                <input type="text" id="settingsLastName" placeholder="Enter last name" />
              </div>

              <div class="settings-field">
                <label for="settingsEmail">Email Address</label>
                <input type="email" id="settingsEmail" placeholder="Enter email address" />
              </div>
            </div>

            <div class="settings-form-actions">
              <button type="submit" class="primary-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                <span>Save Profile</span>
              </button>
            </div>

            <p id="profileSettingsMessage" class="settings-message"></p>
          </form>
        </div>

        <div class="card settings-card">
          <div class="section-title">
            <h2>Password Settings</h2>
            <p>Change your account password</p>
          </div>

          <form id="passwordSettingsForm" class="settings-form">
            <div class="settings-field">
              <label for="settingsCurrentPassword">Current Password</label>
              <input type="password" id="settingsCurrentPassword" placeholder="Enter current password" />
            </div>

            <div class="settings-field">
              <label for="settingsNewPassword">New Password</label>
              <input type="password" id="settingsNewPassword" placeholder="Enter new password" />
            </div>

            <div class="settings-form-actions">
              <button type="submit" class="primary-btn">
                <i class="fa-solid fa-key"></i>
                <span>Update Password</span>
              </button>
            </div>

            <p id="passwordSettingsMessage" class="settings-message"></p>
          </form>
        </div>

        <div class="card settings-card settings-card-full">
          <div class="section-title">
            <h2>Preferences</h2>
            <p>Set quick preferences for your account</p>
          </div>

          <div class="settings-preferences">
            <label class="settings-toggle">
              <input type="checkbox" id="settingsEmailAlerts" />
              <span>Email Alerts</span>
            </label>

            <label class="settings-toggle">
              <input type="checkbox" id="settingsOrderRefresh" checked />
              <span>Auto Refresh Orders</span>
            </label>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./index.js//config.js"></script>
  <script type="module" src="./index.js//require-user.js"></script>
  <script type="module" src="./index.js//session-ui.js"></script>
  <script src="./index.js//panel.js"></script>
  <script src="./index.js//loader.js"></script>
  <script src="./index.js//reveal.js"></script>
  <script src="./index.js//toast.js"></script>
  <script src="./index.js//setting.js"></script>
</body>
</html>
